name: geo-photo
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python runtime ─────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch ecosystem (CUDA 11.8) ───────────────────────────────────────────
  - pytorch=2.1.*
  - torchvision=0.16.*
  - torchaudio=2.1.*
  - pytorch-cuda=11.8
  - cudatoolkit=11.8

  # ── Core scientific stack ───────────────────────────────────────────────────
  - numpy=1.24.*
  - pandas=2.0.*
  - scipy=1.11.*
  - scikit-learn=1.3.*
  - matplotlib=3.7.*
  - seaborn=0.12.*

  # ── Geospatial ──────────────────────────────────────────────────────────────
  - geopandas=0.14.*
  - shapely=2.0.*
  - pyproj=3.6.*
  - fiona=1.9.*

  # ── Image processing ────────────────────────────────────────────────────────
  - pillow=10.*
  - opencv=4.8.*

  # ── Jupyter ─────────────────────────────────────────────────────────────────
  - jupyter
  - jupyterlab=4.*
  - ipywidgets

  # ── Utilities ───────────────────────────────────────────────────────────────
  - tqdm=4.66.*
  - pyyaml=6.*
  - python-dotenv
  - requests=2.31.*
  - rich                            # pretty terminal output

  # ── pip packages (not available or outdated on conda) ──────────────────────
  - pip
  - pip:
      # HuggingFace
      - transformers==4.38.*
      - datasets==2.17.*
      - accelerate==0.27.*
      - tokenizers==0.15.*
      - huggingface-hub==0.20.*

      # CLIP
      - openai-clip==1.0.1
      - open-clip-torch==2.24.*

      # Geospatial (pip-only)
      - geopy==2.4.*
      - folium==0.15.*
      - h3==3.7.*                   # h3-py (Uber H3 grid)
      - branca==0.7.*               # folium dependency

      # Experiment tracking
      - wandb==0.16.*
      - mlflow==2.10.*
      - optuna==3.5.*               # hyperparameter optimisation

      # Explainability / visualisation
      - grad-cam==1.5.*             # pytorch-grad-cam
      - plotly==5.18.*
      - kaleido==0.2.*              # static plotly export

      # Training utilities
      - timm==0.9.*                 # EfficientNet-B2 and many other backbones
      - einops==0.7.*
      - albumentations==1.3.*

      # Metrics & evaluation
      - torchmetrics==1.3.*

      # Linting & formatting (dev)
      - black==24.*
      - ruff==0.2.*
      - isort==5.13.*
      - pre-commit==3.6.*

      # Testing
      - pytest==8.*
      - pytest-cov==4.*
