# =============================================================================
# baseline_fast.yaml — Оптимізована конфігурація для завантаженого датасету
# =============================================================================

# ── Дані ─────────────────────────────────────────────────────────────────────
manifest_path:      "dataset/raw/osv5m/manifest.csv"
image_root:         "dataset/raw/osv5m"
countries:          
  - "UA"
  - "PL"
  - "RO"
quality_threshold:  0.0
split_method:       "h3"
h3_resolution:      7             # Дрібніша сітка для кращого розбиття
img_size:           260

# ── Архітектура ──────────────────────────────────────────────────────────────
architecture:       "baseline"
pretrained:         true

# ── Навчання (Stage 1) ───────────────────────────────────────────────────────
stage1_epochs:      5
stage1_lr:          0.001
batch_size:         16
num_workers:        4

# ── Збереження ───────────────────────────────────────────────────────────────
checkpoint_dir:     "results/baseline_fast"
save_top_k:         2

# ── Відтворюваність ──────────────────────────────────────────────────────────
seed:               42
mixed_precision:    true
