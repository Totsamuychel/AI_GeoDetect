# =============================================================================
# streetclip_fast.yaml — Оптимізований під новий датасет
# =============================================================================

# ── Дані ─────────────────────────────────────────────────────────────────────
manifest_path:      "dataset/raw/osv5m/manifest.csv"
image_root:         "dataset/raw/osv5m"
countries:          
  - "UA"
  - "PL"
  - "RO"
quality_threshold:  0.0
split_method:       "h3"
h3_resolution:      7
img_size:           224            # StreetCLIP очікує 224px

# ── Архітектура ──────────────────────────────────────────────────────────────
architecture:       "streetclip"
pretrained:         true

# ── Навчання ─────────────────────────────────────────────────────────────────
stage1_epochs:      5
stage1_lr:          0.0005
stage2_epochs:      10
stage2_lr:          0.00001
batch_size:         16
num_workers:        4

# ── Збереження ───────────────────────────────────────────────────────────────
checkpoint_dir:     "results/streetclip_fast"
save_top_k:         2

# ── Відтворюваність ──────────────────────────────────────────────────────────
seed:               42
mixed_precision:    true
